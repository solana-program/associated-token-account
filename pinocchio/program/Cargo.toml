[package]
name = "pinocchio-associated-token-account-program"
version = "0.1.0"
description = "A pinocchio-based Associated Token Account program"
authors = ["Anza Maintainers <maintainers@anza.xyz>"]
repository = "https://github.com/solana-program/associated-token-account"
license = "Apache-2.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[package.metadata.solana]
program-id = "ATokenGPvbdGVxr1b2hvZbsiqW5xWH25efTNsLJA8knL"

[lints]
workspace = true

[dependencies]
pinocchio-associated-token-account-interface = { path = "../interface" }
pinocchio-log = { version = "0.5.1", features = ["macro"] }

# TODO: Waiting on PR #349 to merge and then be released: https://github.com/anza-xyz/pinocchio/pull/349.
#       We need StateWithExtensions API from that PR.
pinocchio = { version = "0.10.1", git = "https://github.com/anza-xyz/pinocchio", rev = "b2c1d325d7da5ca7e4d7283c99690504c015b860", default-features = false, features = ["cpi"] }
pinocchio-system = { version = "0.5.0", git = "https://github.com/anza-xyz/pinocchio", rev = "b2c1d325d7da5ca7e4d7283c99690504c015b860" }

# TODO: Waiting on a pinocchio-system release that includes CreateAccountAllowPrefund ix builder
pinocchio-system-prefund = { package = "pinocchio-system", version = "0.5.0", git = "https://github.com/anza-xyz/pinocchio", rev = "e99a819bb51cbe47f7c76f8762af150b6d1217e2" }
pinocchio-token = { version = "0.5.0", git = "https://github.com/anza-xyz/pinocchio", rev = "b2c1d325d7da5ca7e4d7283c99690504c015b860" }
pinocchio-token-2022 = { version = "0.2.0", git = "https://github.com/anza-xyz/pinocchio", rev = "b2c1d325d7da5ca7e4d7283c99690504c015b860" }

[dev-dependencies]
solana-address = { version = "2.3.0", features = ["atomic"] }
